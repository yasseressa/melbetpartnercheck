<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Melbet Partners | Check your manager</title>
    <meta
      name="description"
      content="Check whether a Melbet Partners manager contact is official before sharing your details."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="manager-page" aria-labelledby="pageTitle">
      <div class="top-contacts" aria-label="Melbet Partners contacts">
        <a class="mail-link" href="mailto:support@melbetpartners.com">
          <span class="mail-icon" aria-hidden="true"></span>
          support@melbetpartners.com
        </a>

        <nav class="social-links" aria-label="Social links">
          <a href="https://www.instagram.com/dani_elassad/" target="_blank" rel="noreferrer">Instagram</a>
          <a href="https://t.me/Daniel_Melbet" target="_blank" rel="noreferrer">Telegram</a>
        </nav>
      </div>

      <a class="return-link" href="https://melbetpartners.com/sign-up?tag=d_4974371m_3993c_" target="_blank" rel="noreferrer">
        <span aria-hidden="true"></span>
        <span data-i18n="return">Return to Melbet Partners</span>
      </a>

      <a class="brand-logo" href="https://melbetpartners.com/sign-up?tag=d_4974371m_3993c_" target="_blank" rel="noreferrer" aria-label="Melbet Partners">
        <span class="brand-main">MELBET</span>
        <span class="brand-sub">PARTNERS</span>
      </a>

      <div class="language-menu">
        <button class="language-button" id="languageButton" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="language-current">
            <span id="currentFlag" class="flag flag-en" aria-hidden="true"></span>
            <span id="currentLanguage">en</span>
          </span>
          <span class="chevron" aria-hidden="true"></span>
        </button>
        <ul class="language-list" id="languageList" role="listbox" aria-label="Language">
          <li><button type="button" role="option" data-language="ru"><span class="flag flag-ru" aria-hidden="true"></span> ru</button></li>
          <li><button type="button" role="option" data-language="en"><span class="flag flag-en" aria-hidden="true"></span> en</button></li>
          <li><button type="button" role="option" data-language="ar"><span class="flag flag-ar" aria-hidden="true"></span> ar</button></li>
          <li><button type="button" role="option" data-language="bd"><span class="flag flag-bd" aria-hidden="true"></span> bd</button></li>
          <li><button type="button" role="option" data-language="fr"><span class="flag flag-fr" aria-hidden="true"></span> fr</button></li>
          <li><button type="button" role="option" data-language="pt"><span class="flag flag-pt" aria-hidden="true"></span> pt</button></li>
          <li><button type="button" role="option" data-language="tr"><span class="flag flag-tr" aria-hidden="true"></span> tr</button></li>
          <li><button type="button" role="option" data-language="uz"><span class="flag flag-uz" aria-hidden="true"></span> uz</button></li>
        </ul>
      </div>

      <section class="check-widget">
        <h1 id="pageTitle" data-i18n="title">Check your manager in 2 clicks</h1>

        <form class="check-form" id="checkerForm" novalidate>
          <div class="platform-field">
            <p class="field-title" data-i18n="searchOn">Search on</p>
            <div class="platform-tabs" role="radiogroup" aria-label="Search on">
              <button class="platform-tab is-active" type="button" role="radio" aria-checked="true" data-platform="telegram">
                <span class="platform-icon" aria-hidden="true">✈</span>
                <span>Telegram</span>
              </button>
              <button class="platform-tab" type="button" role="radio" aria-checked="false" data-platform="facebook">
                <span class="platform-icon" aria-hidden="true">f</span>
                <span>Facebook</span>
              </button>
              <button class="platform-tab" type="button" role="radio" aria-checked="false" data-platform="instagram">
                <span class="platform-icon" aria-hidden="true">◎</span>
                <span>Instagram</span>
              </button>
              <button class="platform-tab" type="button" role="radio" aria-checked="false" data-platform="email">
                <span class="platform-icon" aria-hidden="true">✉</span>
                <span>Mail</span>
              </button>
              <button class="platform-tab" type="button" role="radio" aria-checked="false" data-platform="youtube">
                <span class="platform-icon" aria-hidden="true">▶</span>
                <span>YouTube</span>
              </button>
              <button class="platform-tab" type="button" role="radio" aria-checked="false" data-platform="linkedin">
                <span class="platform-icon" aria-hidden="true">in</span>
                <span>Linkedin</span>
              </button>
              <button class="platform-tab" type="button" role="radio" aria-checked="false" data-platform="whatsapp">
                <span class="platform-icon" aria-hidden="true">☎</span>
                <span>WhatsApp</span>
              </button>
              <button class="platform-tab" type="button" role="radio" aria-checked="false" data-platform="skype">
                <span class="platform-icon" aria-hidden="true">S</span>
                <span>Skype</span>
              </button>
            </div>
          </div>

          <div class="form-field">
            <label for="managerQuery" data-i18n="search">Search</label>
            <input id="managerQuery" name="managerQuery" type="text" autocomplete="off" placeholder="@melbet_manager" required />
          </div>

          <button class="check-button" type="submit" data-i18n="check">Check</button>
        </form>

        <div class="result-panel" id="resultPanel" aria-live="polite" hidden></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
