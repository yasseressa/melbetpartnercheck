<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Melbet Partners | Manager Check</title>
    <meta
      name="description"
      content="Verify whether a Melbet Partners manager contact is official before sharing your details."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="checker-screen" aria-labelledby="page-title">
        <header class="topbar" aria-label="Quick links">
          <a class="back-link" href="https://melbetpartners.com/" target="_blank" rel="noreferrer">
            <span aria-hidden="true">‹</span>
            <span data-i18n="back">Back to partners site</span>
          </a>

          <nav class="socials" aria-label="Contact channels">
            <a href="mailto:support@melbetpartners.com" aria-label="Email support">
              <span aria-hidden="true">@</span>
            </a>
            <a href="https://t.me/melbetpartners" target="_blank" rel="noreferrer" aria-label="Telegram">
              <span aria-hidden="true">TG</span>
            </a>
            <a href="https://wa.me/" target="_blank" rel="noreferrer" aria-label="WhatsApp">
              <span aria-hidden="true">WA</span>
            </a>
          </nav>
        </header>

        <div class="brand-row">
          <a class="brand" href="https://melbetpartners.com/" target="_blank" rel="noreferrer" aria-label="Melbet Partners">
            <span class="brand-mark">M</span>
            <span class="brand-text">
              <strong>MELBET</strong>
              <small>PARTNERS</small>
            </span>
          </a>

          <label class="language-control">
            <span class="sr-only" data-i18n="language">Language</span>
            <select id="languageSelect" aria-label="Language">
              <option value="en">English</option>
              <option value="ar">العربية</option>
              <option value="fr">Français</option>
              <option value="es">Español</option>
            </select>
          </label>
        </div>

        <div class="content-grid">
          <div class="intro">
            <p class="eyebrow" data-i18n="eyebrow">Official contact verification</p>
            <h1 id="page-title" data-i18n="title">Check your Melbet manager</h1>
            <p class="lead" data-i18n="lead">
              Enter the contact you received and confirm it belongs to an authorized Melbet Partners manager before you continue.
            </p>
          </div>

          <form class="checker-card" id="checkerForm" novalidate>
            <div class="field-group">
              <label for="searchType" data-i18n="searchOn">Search on</label>
              <select id="searchType" name="searchType">
                <option value="telegram">Telegram</option>
                <option value="whatsapp">WhatsApp</option>
                <option value="email">Email</option>
                <option value="skype">Skype</option>
                <option value="managerId">Manager ID</option>
              </select>
            </div>

            <div class="field-group">
              <label for="managerQuery" data-i18n="search">Search</label>
              <input
                id="managerQuery"
                name="managerQuery"
                type="text"
                autocomplete="off"
                placeholder="@melbet_manager"
                required
              />
              <p class="hint" data-i18n="hint">Use the exact username, phone, email, Skype name, or manager ID.</p>
            </div>

            <button class="check-button" type="submit">
              <span data-i18n="check">Check</span>
            </button>

            <div class="result-panel" id="resultPanel" aria-live="polite" hidden></div>
          </form>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
