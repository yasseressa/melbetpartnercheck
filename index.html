<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Melbet Partners | Check your manager</title>
    <meta
      name="description"
      content="Check whether a Melbet Partners manager contact is official before sharing your details."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="manager-page" aria-labelledby="pageTitle">
      <div class="top-contacts" aria-label="Melbet Partners contacts">
        <a class="mail-link" href="mailto:b2b@melbetpartners.com">
          <span class="mail-icon" aria-hidden="true"></span>
          b2b@melbetpartners.com
        </a>

        <nav class="social-links" aria-label="Social links">
          <a href="https://www.instagram.com/melbet.partners/" target="_blank" rel="noreferrer">Instagram</a>
          <a href="https://www.linkedin.com/company/melbet-partners/" target="_blank" rel="noreferrer">LinkedIn</a>
        </nav>
      </div>

      <a class="return-link" href="https://melbetpartners.com/" target="_blank" rel="noreferrer">
        <span aria-hidden="true"></span>
        <span data-i18n="return">Return to Melbet Partners</span>
      </a>

      <a class="brand-logo" href="https://melbetpartners.com/" target="_blank" rel="noreferrer" aria-label="Melbet Partners">
        <span class="brand-main">MELBET</span>
        <span class="brand-sub">PARTNERS</span>
      </a>

      <div class="language-menu">
        <button class="language-button" id="languageButton" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span id="currentLanguage">en</span>
          <span class="chevron" aria-hidden="true"></span>
        </button>
        <ul class="language-list" id="languageList" role="listbox" aria-label="Language">
          <li><button type="button" role="option" data-language="ru">ru</button></li>
          <li><button type="button" role="option" data-language="en">en</button></li>
          <li><button type="button" role="option" data-language="ar">ar</button></li>
          <li><button type="button" role="option" data-language="bd">bd</button></li>
          <li><button type="button" role="option" data-language="fr">fr</button></li>
          <li><button type="button" role="option" data-language="pt">pt</button></li>
          <li><button type="button" role="option" data-language="tr">tr</button></li>
          <li><button type="button" role="option" data-language="uz">uz</button></li>
        </ul>
      </div>

      <section class="check-widget">
        <h1 id="pageTitle" data-i18n="title">Check your manager in 2 clicks</h1>

        <form class="check-form" id="checkerForm" novalidate>
          <div class="form-field">
            <label for="searchType" data-i18n="searchOn">Search on</label>
            <select id="searchType" name="searchType">
              <option value="telegram">Telegram</option>
              <option value="whatsapp">WhatsApp</option>
              <option value="email">Email</option>
              <option value="instagram">Instagram</option>
              <option value="youtube">YouTube</option>
              <option value="linkedin">LinkedIn</option>
              <option value="facebook">Facebook</option>
              <option value="skype">Skype</option>
              <option value="managerId">Manager ID</option>
            </select>
          </div>

          <div class="form-field">
            <label for="managerQuery" data-i18n="search">Search</label>
            <input id="managerQuery" name="managerQuery" type="text" autocomplete="off" placeholder="@melbet_manager" required />
          </div>

          <button class="check-button" type="submit" data-i18n="check">Check</button>
        </form>

        <div class="result-panel" id="resultPanel" aria-live="polite" hidden></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
